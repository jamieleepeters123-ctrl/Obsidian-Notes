<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Nunito, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#1E4D3B"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#C68F26"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#C0392B"/>
    </marker>
    <marker id="arrN" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#9AA69D"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1100" height="640" fill="#FBF8F1"/>

  <!-- title -->
  <circle cx="58" cy="46" r="20" fill="#F2B33D"/>
  <text x="58" y="53" text-anchor="middle" font-size="19">🔔</text>
  <text x="92" y="42" font-size="20" font-weight="800" fill="#1E4D3B">Beyond Bell Commander — Prototype Signal Flow</text>
  <text x="92" y="62" font-size="12" font-weight="700" fill="#5B6B60">Pi 5 controller · Allen &amp; Heath AHM-16 · no Sound Node · July 2026</text>

  <!-- ══ STAFF DEVICES ══ -->
  <rect x="40" y="110" width="180" height="72" rx="14" fill="#FFFFFF" stroke="#E7DFCC" stroke-width="2"/>
  <text x="130" y="138" text-anchor="middle" font-size="13" font-weight="800" fill="#22322A">Front office / iPad</text>
  <text x="130" y="156" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">Schoolyard web UI</text>
  <text x="130" y="170" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">(same app as wall panel)</text>

  <!-- ══ PI CONTROLLER ══ -->
  <rect x="300" y="95" width="240" height="160" rx="16" fill="#1E4D3B"/>
  <text x="420" y="122" text-anchor="middle" font-size="13.5" font-weight="800" fill="#FBF8F1">BNS Controller</text>
  <text x="420" y="139" text-anchor="middle" font-size="11" font-weight="700" fill="#BCCFC2">Pi 5 + 7&quot; touch display</text>
  <line x1="322" y1="150" x2="518" y2="150" stroke="#3A6B55" stroke-width="1.5"/>
  <text x="420" y="170" text-anchor="middle" font-size="10.5" font-weight="700" fill="#F2B33D">Node-RED scheduling engine</text>
  <text x="420" y="188" text-anchor="middle" font-size="10.5" font-weight="600" fill="#DCE9E0">Schoolyard UI (kiosk + web)</text>
  <text x="420" y="206" text-anchor="middle" font-size="10.5" font-weight="600" fill="#DCE9E0">AHM driver · phone-home client</text>
  <text x="420" y="224" text-anchor="middle" font-size="10.5" font-weight="600" fill="#DCE9E0">GPIO: EVAC contact input</text>
  <text x="420" y="243" text-anchor="middle" font-size="9.5" font-weight="700" fill="#7FA391">Commissioning via web UI</text>

  <!-- ══ AHM-16 ══ -->
  <rect x="650" y="95" width="220" height="160" rx="16" fill="#FFFFFF" stroke="#E7DFCC" stroke-width="2"/>
  <text x="760" y="122" text-anchor="middle" font-size="13.5" font-weight="800" fill="#22322A">Allen &amp; Heath AHM-16</text>
  <line x1="672" y1="134" x2="848" y2="134" stroke="#F0EBDF" stroke-width="1.5"/>
  <text x="760" y="154" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C68F26">Internal WAV bell player</text>
  <text x="760" y="172" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">16×16 matrix — zone routing</text>
  <text x="760" y="190" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">Priority ducking for paging</text>
  <text x="760" y="208" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">Zone EQ · delay · limiters</text>
  <text x="760" y="228" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">Bell sounds stored on the unit</text>

  <!-- ══ AMP ══ -->
  <rect x="940" y="110" width="130" height="84" rx="14" fill="#FFFFFF" stroke="#E7DFCC" stroke-width="2"/>
  <text x="1005" y="142" text-anchor="middle" font-size="13" font-weight="800" fill="#22322A">100V amp(s)</text>
  <text x="1005" y="160" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">Redback / TOA</text>
  <text x="1005" y="176" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">per zone</text>

  <!-- ══ SPEAKER ZONES ══ -->
  <g font-size="11" font-weight="800" fill="#22322A">
    <rect x="940" y="250" width="130" height="40" rx="11" fill="#FDF3DC" stroke="#E3C77F" stroke-width="2"/>
    <text x="1005" y="275" text-anchor="middle">Classrooms</text>
    <rect x="940" y="298" width="130" height="40" rx="11" fill="#FDF3DC" stroke="#E3C77F" stroke-width="2"/>
    <text x="1005" y="323" text-anchor="middle">COLA horns</text>
    <rect x="940" y="346" width="130" height="40" rx="11" fill="#FDF3DC" stroke="#E3C77F" stroke-width="2"/>
    <text x="1005" y="371" text-anchor="middle">Admin</text>
    <rect x="940" y="394" width="130" height="40" rx="11" fill="#FDF3DC" stroke="#E3C77F" stroke-width="2"/>
    <text x="1005" y="419" text-anchor="middle">Hall</text>
  </g>

  <!-- ══ PAGING MIC ══ -->
  <rect x="650" y="320" width="220" height="56" rx="14" fill="#FFFFFF" stroke="#E7DFCC" stroke-width="2"/>
  <text x="760" y="343" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22322A">Paging mic (front office)</text>
  <text x="760" y="361" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">live announcements</text>

  <!-- ══ FIP ══ -->
  <rect x="40" y="330" width="180" height="72" rx="14" fill="#FCE8E6" stroke="#E8C4C0" stroke-width="2"/>
  <text x="130" y="358" text-anchor="middle" font-size="12.5" font-weight="800" fill="#C0392B">Fire Indicator Panel</text>
  <text x="130" y="376" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8E5B55">certified EWIS — separate</text>
  <text x="130" y="391" text-anchor="middle" font-size="10.5" font-weight="600" fill="#8E5B55">system, untouched</text>

  <!-- ══ SWITCH ══ -->
  <rect x="300" y="470" width="240" height="56" rx="14" fill="#FFFFFF" stroke="#E7DFCC" stroke-width="2"/>
  <text x="420" y="493" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22322A">PoE switch — AV VLAN</text>
  <text x="420" y="511" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">powers Pi · links AHM &amp; staff LAN</text>

  <!-- ══ 4G GATEWAY ══ -->
  <rect x="650" y="470" width="220" height="56" rx="14" fill="#FFFFFF" stroke="#E7DFCC" stroke-width="2"/>
  <text x="760" y="493" text-anchor="middle" font-size="12.5" font-weight="800" fill="#22322A">BNS 4G gateway</text>
  <text x="760" y="511" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B6B60">out-of-band · Tailscale on rack side</text>

  <!-- ══ OFFICE PORTAL ══ -->
  <rect x="940" y="462" width="140" height="72" rx="14" fill="#1E4D3B"/>
  <text x="1010" y="489" text-anchor="middle" font-size="12" font-weight="800" fill="#FBF8F1">BNS office portal</text>
  <text x="1010" y="506" text-anchor="middle" font-size="10" font-weight="600" fill="#BCCFC2">Docker · fixed IP</text>
  <text x="1010" y="521" text-anchor="middle" font-size="10" font-weight="600" fill="#BCCFC2">dashboards · alerts</text>

  <!-- ══════════ CONNECTIONS ══════════ -->

  <!-- staff → pi (network) -->
  <line x1="220" y1="146" x2="294" y2="146" stroke="#9AA69D" stroke-width="2.5" stroke-dasharray="2,5" stroke-linecap="round" marker-end="url(#arrN)"/>
  <text x="257" y="136" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9AA69D">LAN / Wi-Fi</text>

  <!-- pi → ahm (control) -->
  <line x1="540" y1="160" x2="644" y2="160" stroke="#1E4D3B" stroke-width="3" stroke-dasharray="9,6" stroke-linecap="round" marker-end="url(#arrG)"/>
  <text x="592" y="146" text-anchor="middle" font-size="9.5" font-weight="800" fill="#1E4D3B">TCP :51325</text>
  <text x="592" y="178" text-anchor="middle" font-size="9" font-weight="700" fill="#5B6B60">play bell · route · mute · hold</text>

  <!-- ahm → amp (audio) -->
  <line x1="870" y1="150" x2="934" y2="150" stroke="#C68F26" stroke-width="4" stroke-linecap="round" marker-end="url(#arrB)"/>
  <text x="902" y="138" text-anchor="middle" font-size="9.5" font-weight="800" fill="#C68F26">zone outs</text>

  <!-- amp → zones (100V spine) -->
  <path d="M 950 194 L 922 214 L 922 414" fill="none" stroke="#C68F26" stroke-width="4" stroke-linecap="round"/>
  <line x1="922" y1="270" x2="934" y2="270" stroke="#C68F26" stroke-width="4" stroke-linecap="round" marker-end="url(#arrB)"/>
  <line x1="922" y1="318" x2="934" y2="318" stroke="#C68F26" stroke-width="4" stroke-linecap="round" marker-end="url(#arrB)"/>
  <line x1="922" y1="366" x2="934" y2="366" stroke="#C68F26" stroke-width="4" stroke-linecap="round" marker-end="url(#arrB)"/>
  <line x1="922" y1="414" x2="934" y2="414" stroke="#C68F26" stroke-width="4" stroke-linecap="round" marker-end="url(#arrB)"/>
  <text x="906" y="238" text-anchor="end" font-size="9.5" font-weight="800" fill="#C68F26">100V line</text>

  <!-- mic → ahm (audio) -->
  <line x1="760" y1="320" x2="760" y2="261" stroke="#C68F26" stroke-width="3" stroke-linecap="round" marker-end="url(#arrB)"/>
  <text x="774" y="295" font-size="9.5" font-weight="700" fill="#C68F26">priority in — ducks bells</text>

  <!-- fip → pi (contact) -->
  <path d="M 220 366 L 340 366 L 340 261" fill="none" stroke="#C0392B" stroke-width="3" stroke-linecap="round" marker-end="url(#arrR)"/>
  <text x="245" y="356" font-size="9.5" font-weight="800" fill="#C0392B">dry contact (N/C)</text>
  <text x="245" y="382" font-size="9" font-weight="700" fill="#8E5B55">GPIO — holds all bells</text>

  <!-- pi ↕ switch (network) -->
  <line x1="420" y1="255" x2="420" y2="464" stroke="#9AA69D" stroke-width="2.5" stroke-dasharray="2,5" stroke-linecap="round"/>

  <!-- ahm ↕ switch (network) -->
  <path d="M 700 255 L 700 440 L 480 440 L 480 464" fill="none" stroke="#9AA69D" stroke-width="2.5" stroke-dasharray="2,5" stroke-linecap="round"/>

  <!-- switch → gateway (network) -->
  <line x1="540" y1="498" x2="644" y2="498" stroke="#9AA69D" stroke-width="2.5" stroke-dasharray="2,5" stroke-linecap="round" marker-end="url(#arrN)"/>

  <!-- gateway → portal -->
  <line x1="870" y1="498" x2="934" y2="498" stroke="#9AA69D" stroke-width="2.5" stroke-dasharray="2,5" stroke-linecap="round" marker-end="url(#arrN)"/>
  <text x="902" y="488" text-anchor="middle" font-size="9" font-weight="700" fill="#9AA69D">4G</text>

  <!-- telemetry note -->
  <text x="700" y="556" text-anchor="middle" font-size="10" font-weight="700" fill="#5B6B60">Outbound HTTPS :443 only — heartbeats, bell events, command polling. Nothing inbound at the school.</text>

  <!-- ══ LEGEND ══ -->
  <g font-size="10.5" font-weight="700">
    <line x1="48" y1="588" x2="86" y2="588" stroke="#C68F26" stroke-width="4" stroke-linecap="round"/>
    <text x="94" y="592" fill="#22322A">Audio</text>
    <line x1="158" y1="588" x2="196" y2="588" stroke="#1E4D3B" stroke-width="3" stroke-dasharray="9,6" stroke-linecap="round"/>
    <text x="204" y="592" fill="#22322A">Control</text>
    <line x1="282" y1="588" x2="320" y2="588" stroke="#C0392B" stroke-width="3" stroke-linecap="round"/>
    <text x="328" y="592" fill="#22322A">Safety contact</text>
    <line x1="438" y1="588" x2="476" y2="588" stroke="#9AA69D" stroke-width="2.5" stroke-dasharray="2,5" stroke-linecap="round"/>
    <text x="484" y="592" fill="#22322A">Network / telemetry</text>
  </g>
  <text x="48" y="616" font-size="10" font-weight="700" fill="#8E5B55">Certified EWIS remains fully independent — Bell Commander only holds its own bells during an alarm.</text>
</svg>
